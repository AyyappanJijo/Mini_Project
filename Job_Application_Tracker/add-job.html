<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Job — JobTracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="add-job">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">💼</div>
        <span class="logo-text">JobTracker</span>
      </div>
      <nav>
        <a href="dashboard.html">
          <span class="nav-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="add-job.html" class="active">
          <span class="nav-icon">➕</span>
          <span>Add Job</span>
        </a>
        <a href="#" onclick="exportCSV(); return false;">
          <span class="nav-icon">⬇️</span>
          <span>Export CSV</span>
        </a>
        <a href="#" onclick="logout(); return false;" style="margin-top: auto;">
          <span class="nav-icon">🚪</span>
          <span>Logout</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <p>Signed in as<br><span id="sidebar-user">—</span></p>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <div class="page-header">
        <div>
          <h1 class="page-title">Add Application</h1>
          <p class="page-subtitle">Log a new job application with all its details</p>
        </div>
        <a href="dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
      </div>

      <div class="form-container">

        <div class="form-row">
          <div class="input-group">
            <label>Company Name *</label>
            <input id="company" placeholder="e.g. Google, Zoho, Infosys">
          </div>
          <div class="input-group">
            <label>Job Role *</label>
            <input id="role" placeholder="e.g. Frontend Developer">
          </div>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label>Location</label>
            <input id="location" placeholder="e.g. Chennai, Remote">
          </div>
          <div class="input-group">
            <label>Status</label>
            <select id="status">
              <option>Applied</option>
              <option>Interview</option>
              <option>Offer</option>
              <option>Rejected</option>
            </select>
          </div>
        </div>

        <div class="input-group" style="margin-bottom: 18px;">
          <label>Notes</label>
          <textarea id="notes" placeholder="e.g. Applied via referral, coding round scheduled, contact: hr@company.com…"></textarea>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label>Follow-up Date</label>
            <input type="date" id="followup">
          </div>
          <div class="input-group" style="justify-content: flex-end;">
            <!-- spacer -->
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" onclick="addJob()">💾 Save Application</button>
          <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
        </div>

      </div>

    </main>
  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
</body>
</html>
