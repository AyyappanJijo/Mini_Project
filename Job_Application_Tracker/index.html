<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobTracker — Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="login-page">
    <div class="login-card">

      <div class="login-header">
        <div class="login-logo">💼</div>
        <h1>JobTracker</h1>
        <p>Track every application. Land your dream job.</p>
      </div>

      <div class="login-form">
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter your name" autocomplete="username">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password"
            autocomplete="current-password"
            onkeydown="if(event.key==='Enter') login()">
        </div>
        <button class="btn btn-primary" style="width:100%; justify-content:center; padding:13px;" onclick="login()">
          Sign In →
        </button>
      </div>

      <div class="login-hint">
        Demo password: <strong>password123</strong>
      </div>

    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
</body>
</html>
