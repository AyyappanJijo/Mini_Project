<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyLens — Weather Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Animated background orbs -->
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="wrapper">

    <!-- Header -->
    <header>
      <div class="brand">☁ Sky<span>Lens</span></div>
      <div class="header-sub">Powered by OpenWeatherMap</div>
    </header>

    <!-- API Key Notice -->
    <div class="api-notice" id="apiNotice">
      <strong>🔑 Setup Required</strong> — Enter your free OpenWeatherMap API key below.<br/>
      Get one at <strong>openweathermap.org/api</strong> → Free plan → <code>Current Weather Data</code> & <code>5 Day Forecast</code>
      <div class="key-row">
        <input type="text" id="apiKeyInput" placeholder="Paste your API key here…"/>
        <button class="btn-save" onclick="saveKey()">Save</button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search city… e.g. London, Tokyo, Chennai"/>
      <button class="btn" onclick="searchWeather()">Search</button>
      <button class="btn btn-geo" title="Use my location" onclick="getGeo()">📍</button>
    </div>

    <!-- Loading / Error messages -->
    <div class="message" id="loadingMsg">
      <div class="spinner"></div>
      Fetching weather data…
    </div>
    <div class="message error" id="errorMsg"></div>

    <!-- Current weather card -->
    <div class="glass main-card" id="mainCard">
      <div class="main-top">
        <div>
          <div class="city-name" id="cityName">—</div>
          <div class="country-tag" id="countryTag"></div>
          <span class="weather-icon-main" id="mainIcon">🌤</span>
          <div class="condition" id="condition">—</div>
        </div>
        <div class="main-right">
          <div class="temp-big" id="tempBig">—<sup>°C</sup></div>
          <div class="feels" id="feelsLike">Feels like —</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="stats-row" id="statsRow"></div>
    </div>

    <!-- Hourly forecast -->
    <div class="section-title" id="hourlyTitle" style="display:none">Hourly Forecast</div>
    <div class="hourly-row" id="hourlyRow"></div>

    <!-- 5-Day forecast -->
    <div class="section-title" id="forecastTitle" style="display:none">5-Day Forecast</div>
    <div class="forecast-grid" id="forecastGrid"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
