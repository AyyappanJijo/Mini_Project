<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELMS — Login</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="login-page">

  <!-- Animated blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="login-wrapper">
    <div class="login-card glass">
      <div class="login-brand">
        <span class="brand-icon">🌿</span>
        <h1>ELMS</h1>
        <p>Employee Leave Management System</p>
      </div>

      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input id="username" type="text" placeholder="Enter your username" autocomplete="off">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input id="password" type="password" placeholder="Enter your password">
          <button class="toggle-pw" onclick="togglePw()" type="button">👁</button>
        </div>
      </div>

      <div class="login-hint">
        <small>Demo: <code>admin</code> / <code>admin123</code></small>
      </div>

      <button class="btn-primary full" onclick="login()">
        <span>Sign In</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>

      <div id="loginError" class="error-msg hidden">⚠ Invalid credentials. Try again.</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
